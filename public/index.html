<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>URL Shortener App</h1>
        <form id="shorten-form">
            <div>
                <label for="url">Enter URL: </label>
                <input type="url" name="url" id="url" required>
            </div>
            <div>
                <label for="shortCode">Enter Short Code [Optional]: </label>
                <input type="text" name="shortCode" id="shortCode">
            </div>
            <button type="submit">Shorten It </button>
        </form>
        
        <h2>Shortened URLs</h2>
        <ul id="shortened-urls"></ul>
    </div>

    <!--* Sript writing -->
    <script>
        const getLinks = async () => {
            const response = await fetch('/getlinks');
            links = await response.json();
            // Getting reference to the url showing panel
            const ul = document.getElementById('shortened-urls');
            // Clear all <li> of shortened urls
            ul.innerHTML = "";
            for (const [shortCode, url] of Object.entries(links)) {
                const li = document.createElement('li');
                li.innerHTML = `<a href="/${shortCode}" target="_blank">${window.location.origin}/${shortCode}</a><p>${url}</p>`;
                ul.append(li);
            }
        };

        document.getElementById('shorten-form').addEventListener('submit', async (event) => {
            event.preventDefault();

            // Web APIs
            // const formData = new FormData(form, submitter);
            const formData = new FormData(event.target);
            const url = formData.get('url');
            const shortCode = formData.get('shortCode');

            // Hitting API
            try {
                const response = await fetch('/shorten', {
                    method : "POST",
                    headers : {"Content-Type" : "application/json"},
                    body : JSON.stringify({ url, shortCode })
                });

                if (response.ok) {
                    getLinks();
                    alert('Form submitted Successfully.');
                }
                else {
                    const errorMessage = await response.statusText;
                    alert(errorMessage);
                }
            } catch (error) {
                console.error(error);
            }
        });
        getLinks();
    </script>
</body>
</html>
